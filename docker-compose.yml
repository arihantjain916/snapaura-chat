services:
  websocket:
    image: arihantjain916/snapaura-chat
    build:
      context: .
      dockerfile: Dockerfile
    container_name: websocket
    ports:
      - "3001:3001"
    restart: always
    env_file:
      - .env
    # Uploads are buffered in memory (25MB cap), so leave headroom above the
    # Node baseline. At the previous 150MB a single large upload was an OOM.
    mem_limit: 400m
