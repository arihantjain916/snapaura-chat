name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: arihantjain916/snapaura-chat

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on server
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH and redeploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          # The repo lives under /root, which the `ubuntu` login user cannot even
          # traverse (mode 0700), so the whole block runs as root via sudo.
          # `ubuntu` has passwordless sudo on the stock AWS AMI.
          script: |
            sudo -H bash -eu <<'EOF'
              cd /root/arihant/laravel/snapaura-chat

              # 1. pull the latest code (compose file; .env stays untouched)
              git fetch --all
              git reset --hard origin/main

              # 2. pull the freshly built image
              docker compose pull websocket

              # 3. restart only the websocket service
              docker compose up -d websocket

              # 4. clean up old layers
              docker image prune -f
            EOF
